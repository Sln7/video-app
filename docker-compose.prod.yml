# Production Docker Compose — deploy via Coolify as "Docker Compose" application.
#
# Coolify handles HTTPS/TLS externally via Traefik, so no Caddy is needed here.
# Configure the following in Coolify UI:
#   - Service: app  |  Port: 80
#   - All variables below as Environment Variables in Coolify's interface.
#
# Required env vars (set in Coolify):
#   APP_KEY, APP_URL, DB_DATABASE, DB_USERNAME, DB_PASSWORD,
#   REDIS_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD,
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_BUCKET, AWS_ENDPOINT,
#   YOUTUBE_API_KEY

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.prod
        image: video-app/app:latest
        environment:
            APP_NAME: '${APP_NAME:-VideoApp}'
            APP_ENV: production
            APP_KEY: '${APP_KEY}'
            APP_DEBUG: 'false'
            APP_URL: '${APP_URL}'
            APP_TIMEZONE: '${APP_TIMEZONE:-America/Sao_Paulo}'
            LOG_CHANNEL: stderr
            LOG_LEVEL: error
            DB_CONNECTION: pgsql
            DB_HOST: pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            SESSION_DRIVER: database
            SESSION_LIFETIME: '${SESSION_LIFETIME:-120}'
            QUEUE_CONNECTION: redis
            CACHE_STORE: redis
            REDIS_CLIENT: phpredis
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: '${REDIS_PASSWORD}'
            BROADCAST_CONNECTION: log
            FILESYSTEM_DISK: s3
            AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID}'
            AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY}'
            AWS_DEFAULT_REGION: '${AWS_DEFAULT_REGION:-us-east-1}'
            AWS_BUCKET: '${AWS_BUCKET}'
            AWS_URL: '${AWS_URL}'
            AWS_ENDPOINT: '${AWS_ENDPOINT:-http://minio:9000}'
            AWS_USE_PATH_STYLE_ENDPOINT: 'true'
            YOUTUBE_API_KEY: '${YOUTUBE_API_KEY}'
            FFMPEG_PATH: /usr/bin/ffmpeg
            WWWUSER: '${WWWUSER:-1337}'
            AUTH_GUARD: api
            AUTH_PASSWORD_BROKER: users
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        networks:
            - app-network
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    queue-worker:
        image: video-app/app:latest
        entrypoint: ['gosu', 'sail', 'php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--max-time=3600']
        environment:
            APP_ENV: production
            APP_KEY: '${APP_KEY}'
            DB_CONNECTION: pgsql
            DB_HOST: pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            QUEUE_CONNECTION: redis
            CACHE_STORE: redis
            REDIS_CLIENT: phpredis
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: '${REDIS_PASSWORD}'
            FILESYSTEM_DISK: s3
            AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID}'
            AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY}'
            AWS_DEFAULT_REGION: '${AWS_DEFAULT_REGION:-us-east-1}'
            AWS_BUCKET: '${AWS_BUCKET}'
            AWS_ENDPOINT: '${AWS_ENDPOINT:-http://minio:9000}'
            AWS_USE_PATH_STYLE_ENDPOINT: 'true'
            FFMPEG_PATH: /usr/bin/ffmpeg
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        networks:
            - app-network
        depends_on:
            - app
            - redis
        restart: unless-stopped

    horizon:
        image: video-app/app:latest
        entrypoint: ['gosu', 'sail', 'php', 'artisan', 'horizon']
        environment:
            APP_ENV: production
            APP_KEY: '${APP_KEY}'
            DB_CONNECTION: pgsql
            DB_HOST: pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            QUEUE_CONNECTION: redis
            CACHE_STORE: redis
            REDIS_CLIENT: phpredis
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: '${REDIS_PASSWORD}'
            FILESYSTEM_DISK: s3
            AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID}'
            AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY}'
            AWS_DEFAULT_REGION: '${AWS_DEFAULT_REGION:-us-east-1}'
            AWS_BUCKET: '${AWS_BUCKET}'
            AWS_ENDPOINT: '${AWS_ENDPOINT:-http://minio:9000}'
            AWS_USE_PATH_STYLE_ENDPOINT: 'true'
            FFMPEG_PATH: /usr/bin/ffmpeg
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        networks:
            - app-network
        depends_on:
            - app
            - redis
        restart: unless-stopped

    pgsql:
        image: 'postgres:17'
        environment:
            PGPASSWORD: '${DB_PASSWORD}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'pgsql-data:/var/lib/postgresql/data'
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            retries: 5
            timeout: 5s
            interval: 10s
        restart: unless-stopped

    redis:
        image: 'redis:alpine'
        command: >
            sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
                redis-server --requirepass "$$REDIS_PASSWORD";
            else
                redis-server;
            fi'
        environment:
            REDIS_PASSWORD: '${REDIS_PASSWORD:-}'
        volumes:
            - 'redis-data:/data'
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s
            interval: 10s
        restart: unless-stopped

    minio:
        image: 'minio/minio:latest'
        environment:
            MINIO_ROOT_USER: '${MINIO_ROOT_USER}'
            MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD}'
        volumes:
            - 'minio-data:/data'
        networks:
            - app-network
        command: 'minio server /data --console-address ":9001"'
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            retries: 3
            timeout: 5s
            interval: 10s
        restart: unless-stopped

networks:
    app-network:
        driver: bridge

volumes:
    app-storage:
        driver: local
    pgsql-data:
        driver: local
    redis-data:
        driver: local
    minio-data:
        driver: local
